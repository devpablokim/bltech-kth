<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>My PMS — 개인 업무 관리</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%93%8B%3C/text%3E%3C/svg%3E">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="logo">📋 My PMS<small>개인 업무 관리 시스템</small></div>
      <nav>
        <button class="nav-item active" data-view="dashboard">🏠 대시보드</button>
        <button class="nav-item" data-view="today">🔥 오늘 할 일<span class="badge" id="todayBadge"></span></button>
        <button class="nav-item" data-view="work">💼 회사 업무</button>
        <button class="nav-item" data-view="personal">🏡 개인 업무</button>
        <button class="nav-item" data-view="growth">🌱 자기계발</button>
        <button class="nav-item" data-view="schedule">📅 개인 일정</button>
      </nav>
      <div class="sidebar-footer">
        <button id="exportBtn" title="데이터를 JSON 파일로 백업">⬇ 백업</button>
        <button id="importBtn" title="JSON 백업 파일 불러오기">⬆ 복원</button>
        <input type="file" id="importFile" hidden accept=".json,application/json">
      </div>
    </aside>

    <main>
      <header class="topbar">
        <div id="viewTitle">🏠 대시보드</div>
        <input id="search" type="search" placeholder="작업 · 일정 검색">
        <button id="addTaskBtn" class="primary">＋ 새 작업</button>
      </header>
      <section id="content"></section>
    </main>
  </div>

  <div id="modalRoot"></div>
  <script src="app.js"></script>
</body>
</html>
